name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build MailGopher
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.2
    - name: Build the application
      run: |
        go build -o mailgopher .